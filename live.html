<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MetaBody Club — Sessão Ao Vivo" />
  <title>Sessão Ao Vivo | MetaBody Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
  <!-- Styles will be imported by Vite -->
  <style>
    /* ── Reset ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-deepest: #07131C;
      --blue-dark:    #0D2233;
      --blue-mid:     #1A3A52;
      --blue-base:    #2A5470;
      --blue-soft:    #4A7A9B;
      --blue-pale:    #C8DDE8;
      --green-dark:   #1B5E20;
      --green-mid:    #2E7D32;
      --green-base:   #4CAF50;
      --green-light:  #76C442;
      --cyan-mid:     #29A8D4;
      --white:        #FFFFFF;
      --radius:       12px;
      --radius-lg:    20px;
      --ease:         0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--blue-deepest);
      color: var(--white);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; border: none; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--blue-deepest); }
    ::-webkit-scrollbar-thumb { background: var(--cyan-mid); border-radius: 3px; }

    /* ── NAVBAR ────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7, 19, 28, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 1rem 1.5rem;
    }

    .topbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
    }

    .topbar-back {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--cyan-mid);
      font-size: 0.85rem;
      font-weight: 600;
      transition: all var(--ease);
    }

    .topbar-back:hover {
      background: rgba(76, 175, 80, 0.1);
      border-color: rgba(76, 175, 80, 0.3);
      color: var(--green-light);
    }

    /* ── LOADING STATE ──────────────────────────────── */
    .live-loading,
    .live-error {
      max-width: 900px;
      margin: 3rem auto;
      padding: 2rem;
      text-align: center;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    .live-error {
      border-color: rgba(255, 85, 85, 0.3);
      background: rgba(255, 85, 85, 0.05);
    }

    .live-page-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
  </style>
</head>
<body>

  <!-- ░░░ TOPBAR ░░░ -->
  <div class="topbar">
    <div class="topbar-inner">
      <a href="./index.html" class="topbar-logo">MetaBody Club</a>
      <a href="./index.html" class="topbar-back">
        <span>← Voltar</span>
      </a>
    </div>
  </div>

  <!-- ░░░ LIVE PAGE CONTENT ░░░ -->
  <main class="live-page-container">
    <div id="live-content">
      <div class="live-loading">
        <p>Carregando sessão...</p>
      </div>
    </div>
  </main>

  <script>
    /**
     * Live Page Setup
     * Carrega a live baseada no parâmetro ?id=...
     * MVP: Sem integração real com Jitsi ainda
     */

    // Mock de dados (será importado do módulo real)
    const LIVE_SESSIONS_MOCK = [
      {
        id: 'live-001-featured',
        title: 'Mentoria Ao Vivo: Ajuste de Treino e Dieta — Perguntas & Respostas',
        description: 'Nosso especialista em periodização e nutrição esportiva responde suas dúvidas em tempo real. Traga suas dúvidas sobre ajustes de treino, progressão de carga e estratégia de alimentação.',
        startsAt: new Date(Date.now()).toISOString(),
        endsAt: new Date(Date.now() + 60 * 60 * 1000).toISOString(),
        status: 'live',
        roomName: 'metabody-mentoria-001',
        hostName: 'Lucas Mendes',
        hostSubtitle: 'Especialista em Periodização & Nutrição',
        badgeLabel: 'Aberto a Todos',
        isFeatured: true,
        topic: 'Ajuste de treino e dieta — Perguntas & Respostas',
      },
      {
        id: 'live-002-upcoming-1',
        title: 'Q&A Nutrição Esportiva: Suplementação Inteligente',
        description: 'Saiba como escolher os suplementos corretos, dosagens, timing ideal e como conciliar com sua alimentação real.',
        startsAt: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toISOString(),
        endsAt: new Date(Date.now() + 2 * 24 * 60 * 60 * 1000 + 45 * 60 * 1000).toISOString(),
        status: 'scheduled',
        roomName: 'metabody-qa-nutricao-001',
        hostName: 'Beatriz Costa',
        hostSubtitle: 'Nutricionista Esportiva',
        badgeLabel: 'Exclusivo Pro',
        isFeatured: false,
        topic: 'Suplementação Inteligente',
      },
      {
        id: 'live-005-ended',
        title: 'Mentoria Anterior: Ajustes de Rotina e Consistência',
        description: 'Sessão encerrada. Tema: Como manter a consistência em treino mesmo com rotina apertada.',
        startsAt: new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString(),
        endsAt: new Date(Date.now() - 3 * 24 * 60 * 60 * 1000 + 60 * 60 * 1000).toISOString(),
        status: 'ended',
        roomName: 'metabody-mentoria-002',
        hostName: 'Lucas Mendes',
        hostSubtitle: 'Especialista em Periodização & Nutrição',
        badgeLabel: 'Aberto a Todos',
        isFeatured: false,
        topic: 'Ajustes de Rotina e Consistência',
      },
    ]

    // Obter ID da query string
    function getLiveIdFromUrl() {
      const params = new URLSearchParams(window.location.search)
      return params.get('id')
    }

    // Encontrar live
    function findLive(id) {
      return LIVE_SESSIONS_MOCK.find((live) => live.id === id)
    }

    // Formatar data/hora
    function formatDateTime(dateStr) {
      const date = new Date(dateStr)
      const day = String(date.getDate()).padStart(2, '0')
      const month = String(date.getMonth() + 1).padStart(2, '0')
      const hour = String(date.getHours()).padStart(2, '0')
      const minute = String(date.getMinutes()).padStart(2, '0')
      const days = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab']
      const dayName = days[date.getDay()]
      return `${dayName}, ${day}/${month} às ${hour}:${minute}`
    }

    // Renderizar página
    function renderLivePage(live) {
      const statusClass = live.status
      const statusLabel = live.status === 'live' ? 'Ao Vivo' : live.status === 'scheduled' ? 'Agendada' : 'Encerrada'
      
      let jitsiPlaceholder = ''
      let reminderBtn = ''

      if (live.status === 'live') {
        jitsiPlaceholder = `
          <div class="live-jitsi-placeholder">
            <div class="placeholder-icon">📹</div>
            <div class="placeholder-text">Transmissão ao vivo será integrada aqui</div>
            <div class="placeholder-subtext">Próximo passo: integração com Jitsi</div>
          </div>
        `
      }

      if (live.status === 'scheduled') {
        reminderBtn = `
          <button class="live-reminder-btn live-reminder-btn-primary" id="reminder-btn">
            <span class="reminder-icon">🔔</span>
            Quero ser notificado
          </button>
        `
      }

      const html = `
        <div class="live-page-header">
          <span class="live-page-status ${statusClass}">${statusLabel}</span>
          <h1>${live.title}</h1>
          <p class="live-page-subtitle">${live.description}</p>
        </div>

        <div class="live-page-meta">
          <div class="meta-item">
            <span class="label">Data & Hora</span>
            <span class="value">${formatDateTime(live.startsAt)}</span>
          </div>
          <div class="meta-item">
            <span class="label">Facilitador</span>
            <span class="value">${live.hostName}</span>
          </div>
          ${live.hostSubtitle ? `
          <div class="meta-item">
            <span class="label">Especialidade</span>
            <span class="value">${live.hostSubtitle}</span>
          </div>
          ` : ''}
          ${live.badgeLabel ? `
          <div class="meta-item">
            <span class="label">Acesso</span>
            <span class="value">${live.badgeLabel}</span>
          </div>
          ` : ''}
        </div>

        ${jitsiPlaceholder}

        ${reminderBtn}

        <div style="margin-top: 2rem; padding: 1.5rem; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.07); border-radius: 12px;">
          <p style="font-size: 0.85rem; color: rgba(200, 221, 232, 0.7);">
            Esta é uma página de desenvolvimento para a feature "Ao Vivo". 
            O embed do Jitsi será integrado no próximo PR.
          </p>
        </div>
      `

      document.getElementById('live-content').innerHTML = html

      // Listener para reminder button
      const btn = document.getElementById('reminder-btn')
      if (btn) {
        btn.addEventListener('click', () => {
          btn.classList.add('active')
          btn.textContent = '✓ Notificação ativa'
          console.log(`Lembrete ativado para: ${live.id}`)
        })
      }
    }

    // Renderizar erro
    function renderError(message) {
      document.getElementById('live-content').innerHTML = `
        <div class="live-error">
          <p><strong>Erro ao carregar sessão</strong></p>
          <p>${message}</p>
          <p style="margin-top: 1rem; font-size: 0.9rem;">
            <a href="./index.html" style="color: var(--cyan-mid); text-decoration: underline;">Voltar à página inicial</a>
          </p>
        </div>
      `
    }

    // Init
    window.addEventListener('load', () => {
      const liveId = getLiveIdFromUrl()

      if (!liveId) {
        renderError('Nenhuma sessão especificada.')
        return
      }

      const live = findLive(liveId)

      if (!live) {
        renderError(`Sessão não encontrada: ${liveId}`)
        return
      }

      renderLivePage(live)
    })
  </script>

  <style>
    /* Estilos adicionais específicos da página */
    .live-page-header {
      margin-bottom: 2rem;
    }

    .live-page-status {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .live-page-status.live {
      background: rgba(255, 85, 85, 0.2);
      color: #FF5555;
      animation: pulse-live 2s ease-in-out infinite;
    }

    .live-page-status.scheduled {
      background: rgba(76, 175, 80, 0.2);
      color: var(--green-light);
    }

    .live-page-status.ended {
      background: rgba(74, 122, 155, 0.2);
      color: rgba(200, 221, 232, 0.7);
    }

    .live-page-header h1 {
      font-size: clamp(1.5rem, 6vw, 2.2rem);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    .live-page-subtitle {
      font-size: 0.95rem;
      color: rgba(200, 221, 232, 0.7);
      line-height: 1.6;
    }

    .live-page-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1.25rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 12px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .meta-item .label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(200, 221, 232, 0.5);
    }

    .meta-item .value {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .live-jitsi-placeholder {
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, rgba(41, 168, 212, 0.1), rgba(76, 175, 80, 0.05));
      border: 2px dashed rgba(41, 168, 212, 0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
      color: rgba(200, 221, 232, 0.6);
    }

    .placeholder-icon {
      font-size: 3rem;
      opacity: 0.5;
    }

    .placeholder-text {
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
    }

    .placeholder-subtext {
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .live-reminder-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1.5rem;
      background: linear-gradient(135deg, var(--green-mid), var(--green-light));
      color: var(--white);
      font-weight: 800;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all var(--ease);
      box-shadow: 0 4px 16px rgba(76, 175, 80, 0.25);
    }

    .live-reminder-btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 6px 24px rgba(76, 175, 80, 0.35);
      transform: translateY(-2px);
    }

    .live-reminder-btn-primary.active {
      background: rgba(76, 175, 80, 0.2);
      color: var(--green-light);
      border: 1px solid var(--green-light);
      box-shadow: 0 0 16px rgba(76, 175, 80, 0.3);
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (max-width: 768px) {
      .live-page-container {
        padding: 1.5rem 1rem;
      }

      .live-page-meta {
        grid-template-columns: 1fr;
      }

      .live-reminder-btn-primary {
        width: 100%;
        justify-content: center;
      }
    }
  </style>

</body>
</html>
