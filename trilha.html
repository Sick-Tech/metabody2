<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MetaBody Club — Trilha de Mentoria." />
  <title>Trilha | MetaBody Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script src="/public/api.config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-deepest: #07131C;
      --blue-dark:    #0D2233;
      --blue-mid:     #1A3A52;
      --blue-base:    #2A5470;
      --blue-soft:    #4A7A9B;
      --blue-pale:    #C8DDE8;
      --green-dark:   #1B5E20;
      --green-mid:    #2E7D32;
      --green-base:   #4CAF50;
      --green-light:  #76C442;
      --cyan-mid:     #29A8D4;
      --white:        #FFFFFF;
      --ink:          #0A1F2E;
      --radius:       12px;
      --radius-lg:    20px;
      --ease:         0.3s cubic-bezier(0.4, 0, 0.2, 1);
      /* Preenchidos via JS */
      --trail-accent: #76C442;
      --trail-accent-rgb: 76,175,80;
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--blue-deepest);
      color: var(--white);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, h6 { font-family: 'Exo 2', sans-serif; }

    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    button { font-family: inherit; cursor: pointer; border: none; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--blue-deepest); }
    ::-webkit-scrollbar-thumb { background: var(--trail-accent); border-radius: 3px; }

    /* ── TOPBAR ──────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0; z-index: 100;
      background: rgba(7,19,28,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .topbar-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.25rem;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .btn-back {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 0.9rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 0.78rem; font-weight: 700;
      color: rgba(200,221,232,0.6);
      transition: color var(--ease), background var(--ease), border-color var(--ease);
      flex-shrink: 0;
    }

    .btn-back svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.4; }

    .btn-back:hover {
      color: var(--white);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .topbar-trail-name {
      font-size: 0.85rem; font-weight: 800;
      letter-spacing: -0.01em;
      flex: 1; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      padding: 0 0.5rem;
    }

    .topbar-progress-wrap {
      display: flex; align-items: center; gap: 0.55rem;
      flex-shrink: 0;
    }

    .topbar-progress-pct {
      font-size: 0.72rem; font-weight: 800;
      color: var(--trail-accent);
    }

    .topbar-progress-bar-bg {
      width: 80px; height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }

    .topbar-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green-mid), var(--trail-accent));
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    /* ── HERO ──────────────────────────────────────────── */
    .trail-hero {
      position: relative;
      overflow: hidden;
      min-height: 340px;
      display: flex;
      align-items: flex-end;
    }

    .trail-hero-cover {
      position: absolute; inset: 0;
    }

    .trail-hero-cover-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: 1;
    }

    .trail-hero-glow {
      position: absolute; inset: 0; z-index: 2;
      pointer-events: none;
    }

    .trail-hero-overlay {
      position: absolute; inset: 0; z-index: 3;
      background: linear-gradient(
        to bottom,
        rgba(7,19,28,0) 0%,
        rgba(7,19,28,0.15) 40%,
        rgba(7,19,28,0.85) 80%,
        var(--blue-deepest) 100%
      );
    }

    .trail-hero-content {
      position: relative; z-index: 4;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 2rem;
    }

    .trail-hero-tag {
      display: inline-flex; align-items: center;
      padding: 0.2rem 0.7rem;
      border-radius: 50px;
      font-size: 0.6rem; font-weight: 800;
      letter-spacing: 0.14em; text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .trail-hero-title {
      font-size: clamp(1.7rem, 6vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.65rem;
    }

    .trail-hero-desc {
      font-size: 0.88rem;
      color: rgba(200,221,232,0.6);
      line-height: 1.7;
      max-width: 540px;
      margin-bottom: 1.5rem;
    }

    .trail-hero-stats {
      display: flex; flex-wrap: wrap; gap: 1.25rem;
      margin-bottom: 1.75rem;
    }

    .hero-stat {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.78rem; font-weight: 600;
      color: rgba(200,221,232,0.6);
    }

    .hero-stat svg { width: 14px; height: 14px; stroke: var(--trail-accent); stroke-width: 1.8; }
    .hero-stat strong { color: var(--white); font-weight: 800; }

    .trail-hero-cta {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.85rem;
    }

    .btn-watch-next {
      display: inline-flex; align-items: center; gap: 0.55rem;
      padding: 0.9rem 2rem;
      background: linear-gradient(135deg, var(--green-mid), var(--trail-accent));
      border-radius: 50px;
      font-size: 0.88rem; font-weight: 800; letter-spacing: 0.04em;
      color: var(--white);
      box-shadow: 0 6px 28px rgba(var(--trail-accent-rgb), 0.35);
      transition: filter var(--ease), transform var(--ease);
    }

    .btn-watch-next svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; }
    .btn-watch-next:hover { filter: brightness(1.1); transform: translateY(-2px); }

    .hero-progress-inline {
      display: flex; flex-direction: column; gap: 0.3rem;
    }

    .hero-progress-label {
      font-size: 0.62rem; font-weight: 700;
      color: rgba(200,221,232,0.4); text-transform: uppercase; letter-spacing: 0.1em;
    }

    .hero-progress-bar-bg {
      width: 140px; height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden;
    }

    .hero-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green-mid), var(--trail-accent));
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .hero-progress-pct-label {
      font-size: 0.65rem; font-weight: 800;
      color: var(--trail-accent);
      margin-top: 0.1rem;
    }

    /* ── MÓDULOS / AULAS ─────────────────────────────── */
    .trail-main {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.25rem 5rem;
    }

    .modules-header {
      display: flex; align-items: flex-end;
      justify-content: space-between; gap: 1rem;
      margin-bottom: 1.5rem;
      padding-top: 0.5rem;
    }

    .modules-label {
      font-size: 0.62rem; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--trail-accent); margin-bottom: 0.22rem;
    }

    .modules-title {
      font-size: clamp(1.1rem, 3.5vw, 1.5rem);
      font-weight: 900; letter-spacing: -0.02em;
    }

    .modules-count-badge {
      font-size: 0.7rem; font-weight: 800;
      color: rgba(200,221,232,0.4);
      flex-shrink: 0;
    }

    /* Lista de módulos */
    .modules-list {
      display: flex; flex-direction: column; gap: 0.85rem;
    }

    /* Card de módulo / aula */
    .module-card {
      background: #0e1e2b;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      align-items: stretch;
      transition: border-color var(--ease), transform var(--ease), box-shadow var(--ease);
    }

    .module-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 42px rgba(0,0,0,0.28);
    }

    .module-card--done   { border-color: rgba(76,175,80,0.12); }
    .module-card--current { border-color: rgba(var(--trail-accent-rgb),0.35); box-shadow: 0 0 0 1px rgba(var(--trail-accent-rgb),0.08); }
    .module-card--locked  { opacity: 0.55; }

    /* Thumbnail lateral */
    .module-thumb {
      position: relative;
      flex-shrink: 0;
      width: 120px;
      overflow: hidden;
    }

    .module-thumb-bg {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .module-thumb-glow {
      position: absolute; inset: 0; opacity: 0.7;
      transition: opacity 0.35s ease;
    }

    .module-card:hover .module-thumb-glow { opacity: 1; }

    .module-thumb-icon {
      position: relative; z-index: 2;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .module-thumb-icon svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; }

    /* Play overlay no thumb */
    .module-thumb-play {
      position: absolute; inset: 0; z-index: 3;
      background: rgba(7,19,28,0.5);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity var(--ease);
    }

    .module-card--current .module-thumb-play,
    .module-card--done .module-thumb-play { cursor: pointer; }
    .module-card--current:hover .module-thumb-play,
    .module-card--done:hover .module-thumb-play { opacity: 1; }

    .thumb-play-circle {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transform: scale(0.8);
      transition: transform 0.25s ease;
      color: var(--blue-deepest);
    }

    .module-card:hover .thumb-play-circle { transform: scale(1); }
    .thumb-play-circle svg { width: 13px; height: 13px; fill: currentColor; margin-left: 2px; }

    /* Num overlay no canto */
    .module-num-badge {
      position: absolute;
      top: 8px; left: 8px; z-index: 4;
      background: rgba(7,19,28,0.75);
      border-radius: 6px;
      padding: 0.18rem 0.45rem;
      font-size: 0.58rem; font-weight: 900;
      letter-spacing: 0.06em;
      color: rgba(200,221,232,0.55);
    }

    /* Corpo */
    .module-body {
      flex: 1; min-width: 0;
      padding: 1rem 1.15rem;
      display: flex; flex-direction: column; gap: 0.35rem;
    }

    .module-status-row {
      display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap;
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.14rem 0.55rem;
      border-radius: 50px;
      font-size: 0.56rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .status-badge svg { width: 9px; height: 9px; stroke: currentColor; stroke-width: 2.4; fill: none; }

    .status-badge--done    { background: rgba(76,175,80,0.12);   border: 1px solid rgba(76,175,80,0.2);   color: var(--green-light); }
    .status-badge--current { background: rgba(var(--trail-accent-rgb),0.12); border: 1px solid rgba(var(--trail-accent-rgb),0.25); color: var(--trail-accent); }
    .status-badge--locked  { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: rgba(200,221,232,0.3); }

    .module-card-title {
      font-size: 0.93rem; font-weight: 800;
      line-height: 1.35; letter-spacing: -0.01em;
    }

    .module-card--locked .module-card-title { color: rgba(200,221,232,0.35); }

    .module-card-desc {
      font-size: 0.7rem;
      color: rgba(200,221,232,0.42);
      line-height: 1.6;
      flex: 1;
    }

    .module-card-meta {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      margin-top: 0.2rem;
    }

    .meta-pill {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.65rem; font-weight: 600;
      color: rgba(200,221,232,0.38);
    }

    .meta-pill svg { width: 11px; height: 11px; stroke: currentColor; }

    /* Ação no lado direito */
    .module-action {
      display: flex; align-items: stretch; flex-direction: column; justify-content: center; gap: 0.5rem;
      padding: 0 1.1rem;
      flex-shrink: 0;
    }

    .btn-watch {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.15rem;
      border-radius: 50px;
      font-size: 0.72rem; font-weight: 800;
      letter-spacing: 0.03em;
      transition: filter var(--ease), background var(--ease), color var(--ease), border-color var(--ease), transform var(--ease);
      white-space: nowrap;
    }

    .btn-watch svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.2; }

    .btn-watch--primary {
      background: linear-gradient(135deg, var(--green-mid), var(--trail-accent));
      color: var(--white);
      border: none;
      box-shadow: 0 4px 18px rgba(var(--trail-accent-rgb),0.3);
    }

    .btn-watch--primary:hover { filter: brightness(1.1); transform: scale(1.04); }

    .btn-watch--ghost {
      background: rgba(76,175,80,0.07);
      border: 1px solid rgba(76,175,80,0.18);
      color: var(--green-light);
    }

    .btn-watch--ghost:hover { background: rgba(76,175,80,0.14); border-color: rgba(76,175,80,0.3); color: var(--white); }

    .btn-watch--locked {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(200,221,232,0.2);
      cursor: default;
    }

    .btn-complete {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-size: 0.68rem; font-weight: 700;
      border: 1px solid rgba(76,175,80,0.28);
      background: rgba(76,175,80,0.07);
      color: var(--green-light);
      cursor: pointer;
      transition: filter var(--ease), background var(--ease), color var(--ease), border-color var(--ease);
      white-space: nowrap;
    }
    .btn-complete svg { width: 11px; height: 11px; stroke: currentColor; stroke-width: 2.5; fill: none; }
    .btn-complete:hover { background: rgba(76,175,80,0.15); border-color: rgba(76,175,80,0.45); }
    .btn-complete--done {
      background: rgba(76,175,80,0.18);
      border-color: rgba(76,175,80,0.5);
      color: #76C442;
    }
    .btn-complete--done:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.35); color: rgba(239,68,68,0.8); }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE ───────────────────────────────────── */
    @media (max-width: 560px) {
      .module-thumb { width: 90px; }
      .module-card-desc { display: none; }
      .module-action { padding: 0 0.65rem; }
      .btn-watch span { display: none; }
      .btn-watch { padding: 0.55rem 0.7rem; }
      .btn-complete span { display: none; }
      .btn-complete { padding: 0.5rem 0.6rem; }
    }

    @media (min-width: 640px) {
      .trail-hero-content { padding: 3rem 1.5rem 2.5rem; }
      .module-thumb { width: 150px; }
    }

    @media (min-width: 768px) {
      .module-thumb { width: 180px; }
      .trail-hero { min-height: 400px; }
    }

    /* ══════════════════════════════════════════════════
       PLAYER PREMIUM — MetaBody Club
    ══════════════════════════════════════════════════ */
    .mbp-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(7,19,28,0.97);
      display: flex; flex-direction: column;
      opacity: 0; animation: mbp-fadein 0.22s ease forwards;
    }
    @keyframes mbp-fadein { to { opacity: 1; } }
    .mbp-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 1.1rem;
      background: rgba(13,34,51,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .mbp-header-back {
      display: flex; align-items: center; gap: 0.35rem;
      background: none; border: none; cursor: pointer;
      color: rgba(200,221,232,0.55); font-size: 0.72rem; font-weight: 700;
      padding: 0.25rem 0.5rem; border-radius: 6px;
      transition: color 0.15s, background 0.15s; flex-shrink: 0; white-space: nowrap;
    }
    .mbp-header-back:hover { color: #e8f4ea; background: rgba(255,255,255,0.06); }
    .mbp-header-back svg { width: 0.85rem; height: 0.85rem; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; fill: none; flex-shrink:0; }
    .mbp-header-logo {
      font-family: 'Exo 2', sans-serif;
      font-size: 0.75rem; font-weight: 900; letter-spacing: 0.08em;
      color: #76C442; text-transform: uppercase; flex-shrink: 0;
    }
    .mbp-header-sep { width: 1px; height: 1.1rem; background: rgba(255,255,255,0.1); flex-shrink:0; }
    .mbp-header-title {
      font-size: 0.8rem; font-weight: 600; color: rgba(200,221,232,0.85);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .mbp-header-close {
      width: 2rem; height: 2rem; border-radius: 8px; flex-shrink: 0;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(200,221,232,0.6); font-size: 1.05rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s ease; line-height: 1; cursor: pointer;
    }
    .mbp-header-close:hover { background: rgba(255,60,60,0.15); border-color: rgba(255,60,60,0.3); color: #ff6b6b; }
    .mbp-body { flex: 1; display: flex; overflow: hidden; }
    .mbp-playlist {
      width: 290px; flex-shrink: 0;
      background: #0a1e2d;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .mbp-playlist-header {
      padding: 0.9rem 1rem 0.6rem;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.68rem; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(200,221,232,0.35);
      flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .mbp-playlist-list { flex: 1; overflow-y: auto; padding: 0.4rem 0; }
    .mbp-playlist-list::-webkit-scrollbar { width: 3px; }
    .mbp-playlist-list::-webkit-scrollbar-thumb { background: rgba(118,196,66,0.25); border-radius: 3px; }
    .mbp-pli {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.65rem 0.9rem;
      cursor: pointer; transition: background 0.15s ease;
      border-left: 3px solid transparent;
    }
    .mbp-pli:hover { background: rgba(255,255,255,0.04); }
    .mbp-pli.active { background: rgba(118,196,66,0.07); border-left-color: #76C442; }
    .mbp-pli.disabled { opacity: 0.35; cursor: default; }
    .mbp-pli-num {
      font-family: 'Exo 2', sans-serif;
      font-size: 0.62rem; font-weight: 800;
      color: rgba(200,221,232,0.3); min-width: 1.2rem; text-align: center; flex-shrink: 0;
    }
    .mbp-pli.active .mbp-pli-num { color: #76C442; }
    .mbp-pli-icon {
      width: 1.75rem; height: 1.75rem; border-radius: 6px; flex-shrink: 0;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
    }
    .mbp-pli.active .mbp-pli-icon { background: rgba(118,196,66,0.12); border-color: rgba(118,196,66,0.25); }
    .mbp-pli-icon svg { width: 0.65rem; height: 0.65rem; }
    .mbp-pli-info { flex: 1; overflow: hidden; }
    .mbp-pli-title {
      font-size: 0.76rem; font-weight: 600; color: rgba(200,221,232,0.7);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
    }
    .mbp-pli.active .mbp-pli-title { color: #e8f4ea; }
    .mbp-pli-dur { font-size: 0.62rem; color: rgba(200,221,232,0.3); margin-top: 1px; }
    .mbp-pli-playing { display: none; align-items: center; gap: 1.5px; flex-shrink: 0; }
    .mbp-pli.active .mbp-pli-playing { display: flex; }
    .mbp-pli-playing span {
      display: block; width: 2px; border-radius: 2px;
      background: #76C442;
      animation: mbp-bar 0.9s ease-in-out infinite;
    }
    .mbp-pli-playing span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .mbp-pli-playing span:nth-child(2) { height: 12px; animation-delay: 0.2s; }
    .mbp-pli-playing span:nth-child(3) { height: 6px; animation-delay: 0.4s; }
    @keyframes mbp-bar { 0%,100% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } }
    .mbp-video-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #000; overflow: hidden; position: relative;
    }
    #mbp-video { max-width: 100%; max-height: 100%; width: 100%; height: 100%; object-fit: contain; display: block; }
    .mbp-controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 2.5rem 1.25rem 0.9rem;
      background: linear-gradient(to top, rgba(7,19,28,0.95) 0%, transparent 100%);
      display: flex; flex-direction: column; gap: 0.55rem;
      opacity: 0; transition: opacity 0.25s ease;
    }
    .mbp-video-wrap:hover .mbp-controls,
    .mbp-video-wrap.show-controls .mbp-controls { opacity: 1; }
    .mbp-progress-wrap {
      position: relative; height: 4px; cursor: pointer;
      border-radius: 4px; background: rgba(255,255,255,0.15);
    }
    .mbp-progress-wrap:hover { height: 6px; }
    .mbp-progress-wrap:hover .mbp-progress-thumb { opacity: 1; }
    .mbp-progress-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, #4CAF50, #76C442);
      pointer-events: none; position: relative;
    }
    .mbp-progress-thumb {
      position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
      width: 12px; height: 12px; border-radius: 50%;
      background: #76C442; box-shadow: 0 0 6px rgba(118,196,66,0.6);
      opacity: 0; transition: opacity 0.15s; pointer-events: none;
    }
    .mbp-progress-buf {
      position: absolute; top: 0; left: 0; height: 100%; border-radius: 4px;
      background: rgba(255,255,255,0.1); pointer-events: none;
    }
    .mbp-time-tooltip {
      position: absolute; bottom: 14px; transform: translateX(-50%);
      background: rgba(13,34,51,0.92); border: 1px solid rgba(255,255,255,0.1);
      color: #e8f4ea; font-size: 0.65rem; font-weight: 700;
      padding: 2px 6px; border-radius: 4px; pointer-events: none;
      opacity: 0; transition: opacity 0.1s; white-space: nowrap;
    }
    .mbp-progress-wrap:hover .mbp-time-tooltip { opacity: 1; }
    .mbp-ctrl-row { display: flex; align-items: center; gap: 0.5rem; }
    .mbp-btn {
      background: none; border: none; color: rgba(200,221,232,0.75);
      display: flex; align-items: center; justify-content: center;
      width: 2.1rem; height: 2.1rem; border-radius: 8px;
      transition: color 0.15s, background 0.15s; flex-shrink: 0; cursor: pointer;
    }
    .mbp-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .mbp-btn svg { width: 1.1rem; height: 1.1rem; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .mbp-btn.active { color: #76C442; }
    .mbp-time-display {
      font-size: 0.72rem; font-weight: 600; color: rgba(200,221,232,0.55);
      font-variant-numeric: tabular-nums; white-space: nowrap; user-select: none;
    }
    .mbp-time-display em { color: rgba(200,221,232,0.85); font-style: normal; }
    .mbp-spacer { flex: 1; }
    .mbp-vol-wrap { display: flex; align-items: center; gap: 0.4rem; }
    .mbp-vol-slider {
      -webkit-appearance: none; width: 64px; height: 3px; border-radius: 3px;
      background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
    }
    .mbp-vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 11px; height: 11px;
      border-radius: 50%; background: #76C442; cursor: pointer;
    }
    .mbp-speed-btn {
      font-size: 0.66rem; font-weight: 800; letter-spacing: 0.02em;
      color: rgba(200,221,232,0.55); padding: 0 0.4rem;
      background: rgba(255,255,255,0.05); border-radius: 5px; border: none;
      height: 1.5rem; display: flex; align-items: center;
      transition: color 0.15s, background 0.15s; cursor: pointer;
    }
    .mbp-speed-btn:hover { color: #76C442; background: rgba(118,196,66,0.1); }
    .mbp-speed-popup {
      position: absolute; bottom: 3.5rem; right: 1rem;
      background: #0a1e2d; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 0.35rem; display: none;
      flex-direction: column; gap: 1px; z-index: 10;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .mbp-speed-popup.open { display: flex; }
    .mbp-speed-opt {
      font-size: 0.72rem; font-weight: 600; padding: 0.35rem 0.85rem;
      border-radius: 6px; text-align: center; background: none; border: none;
      color: rgba(200,221,232,0.6); transition: all 0.12s; cursor: pointer;
    }
    .mbp-speed-opt:hover { background: rgba(118,196,66,0.1); color: #76C442; }
    .mbp-speed-opt.active { background: rgba(118,196,66,0.15); color: #76C442; font-weight: 800; }
    @media (max-width: 700px) {
      .mbp-body { flex-direction: column; }
      .mbp-playlist {
        width: 100%; height: 160px;
        border-right: none; border-top: 1px solid rgba(255,255,255,0.06);
        order: 2;
      }
      .mbp-playlist-list { display: flex; flex-direction: row; padding: 0.3rem; overflow-x: auto; }
      .mbp-pli { flex-direction: column; min-width: 120px; border-left: none; border-bottom: 3px solid transparent; padding: 0.5rem; }
      .mbp-pli.active { border-bottom-color: #76C442; border-left-color: transparent; }
      .mbp-pli-title { font-size: 0.68rem; white-space: nowrap; }
      .mbp-video-wrap { order: 1; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-inner">
      <button class="btn-back" onclick="window.close(); window.location.href='./dashboard.html';" aria-label="Voltar ao dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar
      </button>

      <span class="topbar-trail-name" id="topbarTitle">Trilha</span>

      <div class="topbar-progress-wrap">
        <span class="topbar-progress-pct" id="topbarPct">0%</span>
        <div class="topbar-progress-bar-bg">
          <div class="topbar-progress-bar" id="topbarBar" style="width:0%"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <div class="trail-hero" id="trailHero">
    <div class="trail-hero-cover" id="heroCover">
      <div class="trail-hero-cover-grid"></div>
      <div class="trail-hero-glow" id="heroGlow"></div>
      <div class="trail-hero-overlay"></div>
    </div>
    <div class="trail-hero-content">
      <span class="trail-hero-tag" id="heroTag">Trilha</span>
      <h1 class="trail-hero-title" id="heroTitle">Carregando…</h1>
      <p class="trail-hero-desc" id="heroDesc"></p>
      <div class="trail-hero-stats" id="heroStats"></div>
      <div class="trail-hero-cta" id="heroCta"></div>
    </div>
  </div>

  <!-- MÓDULOS -->
  <main class="trail-main">
    <div class="modules-header">
      <div>
        <p class="modules-label">Conteúdo da trilha</p>
        <h2 class="modules-title">Módulos & Aulas</h2>
      </div>
      <span class="modules-count-badge" id="modulesCount"></span>
    </div>
    <div class="modules-list" id="modulesList"></div>
  </main>

  <script>
    /* ── Auth guard ──────────────────────────────────── */
    if (!localStorage.getItem('mb_user')) { window.location.replace('./login.html'); }

    const API = window.METABODY_API;

    let _totalMod = 0; // total de módulos da trilha atual

    /* ─── Lê parâmetro de URL ────────────────────────────────── */
    const params  = new URLSearchParams(window.location.search);
    const trailId = params.get('id');

    if (!trailId) {
      window.location.replace('./dashboard.html');
    } else {
      loadTrail(trailId);
    }

    /* ─── Carrega trilha da API ──────────────────────────────── */
    async function loadTrail(id) {
      try {
        const [trailRes, progressRes] = await Promise.all([
          fetch(`${API}/trails/${id}`, { credentials: 'include' }),
          fetch(`${API}/progress/trails/${id}`, { credentials: 'include' }),
        ]);
        if (trailRes.status === 401) { window.location.replace('./login.html'); return; }
        if (trailRes.status === 404) { window.location.replace('./dashboard.html'); return; }
        if (!trailRes.ok) throw new Error('HTTP ' + trailRes.status);
        const trail    = await trailRes.json();
        const progress = progressRes.ok ? await progressRes.json() : [];
        renderTrail(trail, progress);
      } catch (err) {
        console.error('Erro ao carregar trilha:', err);
        const listEl = document.getElementById('modulesList');
        if (listEl) listEl.innerHTML = '<p style="padding:40px;color:rgba(200,221,232,0.4);">Erro ao carregar trilha. Tente novamente.</p>';
      }
    }

    /* ─── Render ─────────────────────────────────────────────── */
    function renderTrail(t, progressList) {
      const modules     = Array.isArray(t.modules) ? t.modules : [];
      _totalMod = modules.length;
      const totalMod    = _totalMod;
      const completedSet = new Set((progressList || []).filter(p => p.completed).map(p => p.module_id));
      const completedCount = completedSet.size;
      const initPct = totalMod > 0 ? Math.round(completedCount / totalMod * 100) : 0;
      const totalDurMin = modules.reduce((sum, m) => sum + (m.duration_min || 0), 0);
      const totalDurStr = totalDurMin >= 60
        ? Math.floor(totalDurMin / 60) + 'h' + (totalDurMin % 60 ? ' ' + (totalDurMin % 60) + 'min' : '')
        : (totalDurMin ? totalDurMin + 'min' : '—');

      // Acento padrão
      document.documentElement.style.setProperty('--trail-accent', '#76C442');
      document.documentElement.style.setProperty('--trail-accent-rgb', '118,196,66');

      document.title = t.name + ' | MetaBody Club';

      // Topbar
      document.getElementById('topbarTitle').textContent = t.name;
      document.getElementById('topbarPct').textContent   = initPct + '%';
      document.getElementById('topbarBar').style.width   = initPct + '%';

      // Cover hero
      const coverEl = document.getElementById('heroCover');
      if (t.thumbnail_url) {
        coverEl.style.backgroundImage    = `url('${t.thumbnail_url}')`;
        coverEl.style.backgroundSize     = 'cover';
        coverEl.style.backgroundPosition = 'center';
      } else {
        coverEl.style.background = 'linear-gradient(135deg, #071a10 0%, #0d2e18 50%, #071a10 100%)';
      }
      document.getElementById('heroGlow').style.background =
        'radial-gradient(ellipse at 55% 55%, rgba(118,196,66,0.28) 0%, transparent 65%)';

      // Tag
      const tagEl = document.getElementById('heroTag');
      tagEl.textContent      = t.name;
      tagEl.style.background = 'rgba(76,175,80,0.15)';
      tagEl.style.border     = '1px solid rgba(76,175,80,0.28)';
      tagEl.style.color      = '#76C442';

      // Título e desc
      document.getElementById('heroTitle').textContent = t.name;
      document.getElementById('heroDesc').textContent  = t.description || '';

      // Stats
      document.getElementById('heroStats').innerHTML = `
        <div class="hero-stat">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 3H8"/></svg>
          <strong>${totalMod}</strong> aulas
        </div>
        <div class="hero-stat">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <strong>${totalDurStr}</strong> de conteúdo
        </div>
        <div class="hero-stat">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <strong id="heroStatCompleted">${completedCount} de ${totalMod}</strong> concluídas
        </div>
      `;

      // CTA
      document.getElementById('heroCta').innerHTML = `
        <button class="btn-watch-next" onclick="document.getElementById('module-1')?.scrollIntoView({behavior:'smooth',block:'center'})">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Iniciar trilha
        </button>
        <div class="hero-progress-inline">
          <span class="hero-progress-label">Progresso</span>
          <div class="hero-progress-bar-bg">
            <div class="hero-progress-bar" style="width:${initPct}%"></div>
          </div>
          <span class="hero-progress-pct-label">${initPct}% concluído</span>
        </div>
      `;

      // Contagem
      document.getElementById('modulesCount').textContent = totalMod + ' aulas nesta trilha';

      // Módulos
      const listEl = document.getElementById('modulesList');
      listEl.innerHTML = '';

      if (!modules.length) {
        listEl.innerHTML = '<p style="padding:40px;color:rgba(200,221,232,0.4);">Nenhum módulo publicado nesta trilha ainda.</p>';
        return;
      }

      modules.forEach((m, idx) => {
        const num     = m.order_num || (idx + 1);
        const durStr  = m.duration_min > 0
          ? (m.duration_min >= 60
              ? Math.floor(m.duration_min / 60) + 'h' + (m.duration_min % 60 ? ' ' + (m.duration_min % 60) + 'min' : '')
              : m.duration_min + 'min')
          : '—';

        const card = document.createElement('div');
        const done = completedSet.has(m.id);
        card.className = 'module-card ' + (done ? 'module-card--done' : 'module-card--current');
        card.id = 'module-' + num;

        card.innerHTML = `
          <div class="module-thumb" style="${m.thumbnail_url ? '' : 'background:linear-gradient(135deg,#071a10,#0d2e18)'}">
            ${m.thumbnail_url ? `<img src="${m.thumbnail_url}" alt="${m.title}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">` : ''}
            <div class="module-thumb-bg">
              <div class="module-thumb-glow" style="background:radial-gradient(circle at center,rgba(76,175,80,0.24) 0%,transparent 70%)"></div>
              ${!m.thumbnail_url ? `<div class="module-thumb-icon" style="background:rgba(76,175,80,0.15);color:var(--green-light);box-shadow:0 0 16px rgba(76,175,80,0.24)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>` : ''}
            </div>
            <div class="module-thumb-play">
              <div class="thumb-play-circle">
                <svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
              </div>
            </div>
            <span class="module-num-badge">${String(num).padStart(2, '0')}</span>
          </div>
          <div class="module-body">
            <div class="module-status-row">
              ${done
                ? `<span class="status-badge status-badge--done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Concluído</span>`
                : `<span class="status-badge status-badge--current"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Disponível</span>`
              }
            </div>
            <h3 class="module-card-title">${m.title}</h3>
            <p class="module-card-desc">${m.description || ''}</p>
            <div class="module-card-meta">
              <span class="meta-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${durStr}
              </span>
              <span class="meta-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 3H8"/></svg>
                Aula ${num}
              </span>
            </div>
          </div>
          <div class="module-action">
            <button class="btn-watch btn-watch--primary" data-module-id="${m.id}" data-trail-id="${t.id}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              <span>Assistir agora</span>
            </button>
            <button class="btn-complete${done ? ' btn-complete--done' : ''}" data-module-id="${m.id}" data-trail-id="${t.id}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              <span>${done ? 'Concluído' : 'Marcar concluído'}</span>
            </button>
          </div>
        `;

        card.querySelector('.btn-watch').addEventListener('click', function() { watchModule(t.id, m.id, this); });
        card.querySelector('.btn-complete').addEventListener('click', function() { toggleComplete(t.id, m.id, this); });
        listEl.appendChild(card);
      });
    }


    /* ─── Player premium + watchModule ───────────────────────────── */

    // Ícones SVG inline (evitar repetição)
    const _SVG = {
      play:     `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
      pause:    `<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`,
      volHi:    `<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`,
      volLo:    `<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`,
      volMute:  `<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`,
      fsEnter:  `<svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`,
      fsExit:   `<svg viewBox="0 0 24 24"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>`,
      prev:     `<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/><line x1="9" y1="18" x2="9" y2="6"/></svg>`,
      next:     `<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/><line x1="15" y1="18" x2="15" y2="6"/></svg>`,
      video:    `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
    };

    function _fmtTime(s) {
      const t = Math.floor(s || 0);
      const m = Math.floor(t / 60);
      const ss = String(t % 60).padStart(2, '0');
      if (m >= 60) return `${Math.floor(m/60)}:${String(m%60).padStart(2,'0')}:${ss}`;
      return `${m}:${ss}`;
    }

    function openVideoPlayer(videos, startIndex, moduleTitle) {
      if (!Array.isArray(videos) || videos.length === 0) return;
      document.querySelectorAll('.mbp-overlay').forEach(el => el.remove());

      let currentIdx = startIndex ?? 0;
      const SPEEDS = [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];
      let currentSpeed = 1;

      /* ── Build DOM ── */
      const overlay = document.createElement('div');
      overlay.className = 'mbp-overlay';

      /* header */
      const safeModuleTitle = (moduleTitle || '').replace(/[<>"&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]));
      overlay.innerHTML = `
        <div class="mbp-header">
          <button class="mbp-header-back" id="mbp-back" title="Voltar para a trilha">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Voltar
          </button>
          <div class="mbp-header-sep"></div>
          <span class="mbp-header-logo">MetaBody</span>
          <div class="mbp-header-sep"></div>
          <span class="mbp-header-title" id="mbp-htitle">${safeModuleTitle}</span>
          <button class="mbp-header-close" id="mbp-close" title="Fechar (ESC)">✕</button>
        </div>
        <div class="mbp-body">
          <aside class="mbp-playlist">
            <div class="mbp-playlist-header">Playlist do módulo</div>
            <div class="mbp-playlist-list" id="mbp-plist"></div>
          </aside>
          <div class="mbp-video-wrap" id="mbp-vwrap">
            <video id="mbp-video" playsinline style="max-width:100%;max-height:100%;width:100%;height:100%;object-fit:contain;display:block;background:#000"></video>
            <div class="mbp-controls" id="mbp-ctrl">
              <div class="mbp-progress-wrap" id="mbp-pgwrap">
                <div class="mbp-progress-buf" id="mbp-buf" style="width:0%"></div>
                <div class="mbp-progress-fill" id="mbp-fill" style="width:0%">
                  <div class="mbp-progress-thumb"></div>
                </div>
                <div class="mbp-time-tooltip" id="mbp-tooltip">0:00</div>
              </div>
              <div class="mbp-ctrl-row">
                <button class="mbp-btn" id="mbp-prev" title="Anterior">${_SVG.prev}</button>
                <button class="mbp-btn" id="mbp-playpause" title="Play/Pause">${_SVG.play}</button>
                <button class="mbp-btn" id="mbp-next" title="Próximo">${_SVG.next}</button>
                <span class="mbp-time-display"><em id="mbp-cur">0:00</em> / <span id="mbp-dur">0:00</span></span>
                <div class="mbp-spacer"></div>
                <div class="mbp-vol-wrap">
                  <button class="mbp-btn" id="mbp-volbtn" title="Mudo">${_SVG.volHi}</button>
                  <input class="mbp-vol-slider" id="mbp-vol" type="range" min="0" max="1" step="0.02" value="1">
                </div>
                <button class="mbp-btn mbp-speed-btn" id="mbp-speedbtn" title="Velocidade">1×</button>
                <button class="mbp-btn" id="mbp-fsbtn" title="Tela cheia">${_SVG.fsEnter}</button>
              </div>
              <div class="mbp-speed-popup" id="mbp-speedpop">
                ${SPEEDS.map(s => `<button class="mbp-speed-opt${s===1?' active':''}" data-spd="${s}">${s}×</button>`).join('')}
              </div>
            </div>
          </div>
        </div>`;

      document.body.appendChild(overlay);

      /* ── Refs ── */
      const video     = overlay.querySelector('#mbp-video');
      const plist     = overlay.querySelector('#mbp-plist');
      const playpause = overlay.querySelector('#mbp-playpause');
      const prev      = overlay.querySelector('#mbp-prev');
      const next      = overlay.querySelector('#mbp-next');
      const fill      = overlay.querySelector('#mbp-fill');
      const buf       = overlay.querySelector('#mbp-buf');
      const pgwrap    = overlay.querySelector('#mbp-pgwrap');
      const tooltip   = overlay.querySelector('#mbp-tooltip');
      const cur       = overlay.querySelector('#mbp-cur');
      const durEl     = overlay.querySelector('#mbp-dur');
      const volbtn    = overlay.querySelector('#mbp-volbtn');
      const volSlider = overlay.querySelector('#mbp-vol');
      const speedbtn  = overlay.querySelector('#mbp-speedbtn');
      const speedpop  = overlay.querySelector('#mbp-speedpop');
      const fsbtn     = overlay.querySelector('#mbp-fsbtn');
      const vwrap     = overlay.querySelector('#mbp-vwrap');
      const htitle    = overlay.querySelector('#mbp-htitle');

      /* ── Build playlist ── */
      function buildPlaylist() {
        plist.innerHTML = '';
        videos.forEach((v, i) => {
          const t = (v.title || `Vídeo ${i+1}`).replace(/[<>"&]/g, c=>({'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]));
          const li = document.createElement('div');
          li.className = 'mbp-pli' + (i === currentIdx ? ' active' : '') + (!v.videoUrl ? ' disabled' : '');
          li.dataset.idx = i;
          li.innerHTML = `
            <span class="mbp-pli-num">${i+1}</span>
            <div class="mbp-pli-icon">${_SVG.video}</div>
            <div class="mbp-pli-info">
              <div class="mbp-pli-title">${t}</div>
              ${v.duration_min ? `<div class="mbp-pli-dur">${v.duration_min} min</div>` : ''}
            </div>
            <div class="mbp-pli-playing"><span></span><span></span><span></span></div>`;
          if (v.videoUrl) {
            li.addEventListener('click', () => switchVideo(i));
          }
          plist.appendChild(li);
        });
      }

      /* ── Switch video ── */
      function switchVideo(idx) {
        const v = videos[idx];
        if (!v?.videoUrl) return;
        currentIdx = idx;
        video.src = v.videoUrl;
        video.play();
        playpause.innerHTML = _SVG.pause;
        fill.style.width = '0%';
        cur.textContent = '0:00';
        durEl.textContent = '0:00';
        htitle.textContent = v.title || moduleTitle;
        // Update playlist active state
        plist.querySelectorAll('.mbp-pli').forEach((el, i) => {
          el.classList.toggle('active', i === currentIdx);
        });
        // Scroll selected item into view
        const activeLi = plist.querySelectorAll('.mbp-pli')[currentIdx];
        if (activeLi) activeLi.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        // Nav buttons
        prev.disabled = currentIdx === 0;
        next.disabled = currentIdx === videos.length - 1;
      }

      buildPlaylist();

      /* ── Init first video ── */
      const first = videos[currentIdx];
      if (first?.videoUrl) {
        video.src = first.videoUrl;
        video.play().catch(() => {});
        playpause.innerHTML = _SVG.pause;
      }
      prev.disabled = currentIdx === 0;
      next.disabled = currentIdx === videos.length - 1;

      /* ── Play/Pause ── */
      playpause.addEventListener('click', () => {
        if (video.paused) { video.play(); playpause.innerHTML = _SVG.pause; }
        else              { video.pause(); playpause.innerHTML = _SVG.play; }
      });
      video.addEventListener('click', () => {
        if (video.paused) { video.play(); playpause.innerHTML = _SVG.pause; }
        else              { video.pause(); playpause.innerHTML = _SVG.play; }
      });

      /* ── Prev / Next ── */
      prev.addEventListener('click', () => { if (currentIdx > 0) switchVideo(currentIdx - 1); });
      next.addEventListener('click', () => { if (currentIdx < videos.length - 1) switchVideo(currentIdx + 1); });

      /* ── Progress ── */
      video.addEventListener('timeupdate', () => {
        if (!video.duration) return;
        const pct = (video.currentTime / video.duration) * 100;
        fill.style.width = pct + '%';
        cur.textContent = _fmtTime(video.currentTime);
        durEl.textContent = _fmtTime(video.duration);
      });
      video.addEventListener('progress', () => {
        if (!video.duration || !video.buffered.length) return;
        buf.style.width = ((video.buffered.end(video.buffered.length - 1) / video.duration) * 100) + '%';
      });
      video.addEventListener('ended', () => {
        playpause.innerHTML = _SVG.play;
        // Auto-advance
        const nextIdx = currentIdx + 1;
        if (nextIdx < videos.length && videos[nextIdx].videoUrl) {
          setTimeout(() => switchVideo(nextIdx), 800);
        }
      });
      video.addEventListener('play',  () => playpause.innerHTML = _SVG.pause);
      video.addEventListener('pause', () => playpause.innerHTML = _SVG.play);

      /* Seek by click */
      let seekDragging = false;
      function doSeek(e) {
        if (!video.duration) return;
        const rect = pgwrap.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        video.currentTime = pct * video.duration;
        fill.style.width = (pct * 100) + '%';
      }
      pgwrap.addEventListener('mousedown', e => { seekDragging = true; doSeek(e); });
      document.addEventListener('mousemove', e => { if (seekDragging) doSeek(e); });
      document.addEventListener('mouseup', () => { seekDragging = false; });
      /* Tooltip on hover */
      pgwrap.addEventListener('mousemove', e => {
        if (!video.duration) return;
        const rect = pgwrap.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        tooltip.textContent = _fmtTime(pct * video.duration);
        tooltip.style.left = (pct * 100) + '%';
      });

      /* ── Volume ── */
      volSlider.addEventListener('input', () => {
        video.volume = parseFloat(volSlider.value);
        video.muted  = (video.volume === 0);
        _updateVolIcon();
      });
      volbtn.addEventListener('click', () => {
        video.muted = !video.muted;
        volSlider.value = video.muted ? 0 : video.volume || 0.7;
        _updateVolIcon();
      });
      function _updateVolIcon() {
        const v = video.muted || video.volume === 0;
        const low = video.volume < 0.5;
        volbtn.innerHTML = v ? _SVG.volMute : low ? _SVG.volLo : _SVG.volHi;
      }

      /* ── Speed ── */
      speedbtn.addEventListener('click', e => {
        e.stopPropagation();
        speedpop.classList.toggle('open');
      });
      speedpop.querySelectorAll('.mbp-speed-opt').forEach(opt => {
        opt.addEventListener('click', () => {
          currentSpeed = parseFloat(opt.dataset.spd);
          video.playbackRate = currentSpeed;
          speedbtn.textContent = currentSpeed + '×';
          speedpop.querySelectorAll('.mbp-speed-opt').forEach(o => o.classList.toggle('active', o === opt));
          speedpop.classList.remove('open');
        });
      });
      document.addEventListener('click', e => {
        if (!speedpop.contains(e.target) && e.target !== speedbtn) speedpop.classList.remove('open');
      }, { capture: false });

      /* ── Fullscreen ── */
      fsbtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          overlay.requestFullscreen?.();
          fsbtn.innerHTML = _SVG.fsExit;
        } else {
          document.exitFullscreen?.();
          fsbtn.innerHTML = _SVG.fsEnter;
        }
      });
      document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) fsbtn.innerHTML = _SVG.fsEnter;
      });

      /* ── Controls auto-hide ── */
      let hideTimer;
      vwrap.addEventListener('mousemove', () => {
        vwrap.classList.add('show-controls');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => { if (!video.paused) vwrap.classList.remove('show-controls'); }, 2800);
      });
      vwrap.addEventListener('mouseleave',  () => { if (!video.paused) vwrap.classList.remove('show-controls'); });
      video.addEventListener('pause', ()  => vwrap.classList.add('show-controls'));
      // Always show on touch
      vwrap.addEventListener('touchstart', () => {
        vwrap.classList.add('show-controls');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => vwrap.classList.remove('show-controls'), 3500);
      });

      /* ── Keyboard shortcuts ── */
      const onKey = e => {
        if (e.target.tagName === 'INPUT') return;
        switch (e.code) {
          case 'Space': case 'KeyK':
            e.preventDefault();
            if (video.paused) { video.play(); playpause.innerHTML = _SVG.pause; }
            else              { video.pause(); playpause.innerHTML = _SVG.play; }
            break;
          case 'ArrowRight': e.preventDefault(); video.currentTime = Math.min(video.duration||0, video.currentTime + 10); break;
          case 'ArrowLeft':  e.preventDefault(); video.currentTime = Math.max(0, video.currentTime - 10); break;
          case 'ArrowUp':    e.preventDefault(); video.volume = Math.min(1, video.volume + 0.1); volSlider.value = video.volume; _updateVolIcon(); break;
          case 'ArrowDown':  e.preventDefault(); video.volume = Math.max(0, video.volume - 0.1); volSlider.value = video.volume; _updateVolIcon(); break;
          case 'KeyM':       video.muted = !video.muted; _updateVolIcon(); break;
          case 'KeyF':       fsbtn.click(); break;
          case 'Escape':     close(); break;
        }
      };
      document.addEventListener('keydown', onKey);

      /* ── Close ── */
      function close() {
        video.pause();
        if (document.fullscreenElement) document.exitFullscreen?.();
        document.removeEventListener('keydown', onKey);
        clearTimeout(hideTimer);
        overlay.style.animation = 'mbp-fadein 0.18s ease reverse forwards';
        setTimeout(() => overlay.remove(), 180);
      }
      overlay.querySelector('#mbp-close').addEventListener('click', close);
      overlay.querySelector('#mbp-back').addEventListener('click', close);
    }

    /* ─── Atualiza barras e contadores de progresso ──────────── */
    function refreshProgressUI() {
      const done = document.querySelectorAll('#modulesList .module-card--done').length;
      const pct  = _totalMod > 0 ? Math.round(done / _totalMod * 100) : 0;
      document.getElementById('topbarPct').textContent = pct + '%';
      document.getElementById('topbarBar').style.width = pct + '%';
      const heroBar    = document.querySelector('.hero-progress-bar');
      const heroPctLbl = document.querySelector('.hero-progress-pct-label');
      const heroStat   = document.getElementById('heroStatCompleted');
      if (heroBar)    heroBar.style.width = pct + '%';
      if (heroPctLbl) heroPctLbl.textContent = pct + '% concluído';
      if (heroStat)   heroStat.textContent = done + ' de ' + _totalMod;
    }

    /* ─── Marcar / desmarcar módulo como concluído ───────────── */
    async function toggleComplete(trailId, moduleId, btn) {
      const wasDone = btn.classList.contains('btn-complete--done');
      btn.disabled = true;
      try {
        const method = wasDone ? 'DELETE' : 'POST';
        const res    = await fetch(
          `${API}/progress/trails/${trailId}/modules/${moduleId}/complete`,
          { method, credentials: 'include' }
        );
        if (res.status === 401) { window.location.replace('./login.html'); return; }
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const card  = btn.closest('.module-card');
        const badge = card?.querySelector('.status-badge');
        const span  = btn.querySelector('span');
        if (wasDone) {
          btn.classList.remove('btn-complete--done');
          if (span)  span.textContent = 'Marcar concluído';
          if (card)  { card.classList.remove('module-card--done'); card.classList.add('module-card--current'); }
          if (badge) { badge.className = 'status-badge status-badge--current'; badge.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Disponível'; }
        } else {
          btn.classList.add('btn-complete--done');
          if (span)  span.textContent = 'Concluído';
          if (card)  { card.classList.remove('module-card--current'); card.classList.add('module-card--done'); }
          if (badge) { badge.className = 'status-badge status-badge--done'; badge.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Concluído'; }
        }
        refreshProgressUI();
      } catch (err) {
        console.error('Erro ao atualizar progresso:', err);
        alert('Erro ao atualizar progresso. Tente novamente.');
      }
      btn.disabled = false;
    }

    /* ─── Abre vídeo(s) do módulo ─────────────────────────────────── */
    async function watchModule(trailId, moduleId, btn) {
      const origHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Carregando…`;

      try {
        const res = await fetch(`${API}/trails/${trailId}/modules/${moduleId}`, { credentials: 'include' });
        if (res.status === 401) { window.location.replace('./login.html'); return; }
        if (!res.ok) {
          alert('Não foi possível carregar o módulo. Tente novamente.');
          btn.disabled = false; btn.innerHTML = origHtml; return;
        }
        const data = await res.json();

        if (Array.isArray(data.videos) && data.videos.length > 0) {
          const hasAny = data.videos.some(v => !!v.videoUrl);
          if (!hasAny) { alert('Este módulo ainda não possui vídeos publicados.'); }
          else { openVideoPlayer(data.videos, 0, data.title); }
        } else if (data.videoUrl) {
          // Vídeo legado
          openVideoPlayer([{ videoUrl: data.videoUrl, title: data.title }], 0, data.title);
        } else {
          alert('Este módulo ainda não possui vídeos publicados.');
        }
      } catch (err) {
        console.error('Erro ao carregar módulo:', err);
        alert('Erro ao carregar o módulo. Tente novamente.');
      }
      btn.disabled = false;
      btn.innerHTML = origHtml;
    }
  </script>
</body>
